name: Save WBS Data

on:
  repository_dispatch:
    types: [save-wbs-data]

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_CLASSIC_TOKEN }}

      - name: Write data
        run: |
          cat << 'EOF' > wbs_data.json
          ${{ toJson(github.event.client_payload.data) }}
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add wbs_data.json
          git diff --staged --quiet || git commit -m "進捗更新 ${{ github.event.client_payload.timestamp }}"
          git push
